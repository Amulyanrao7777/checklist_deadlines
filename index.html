  /* ---------------- safe merge (same logic as My Shelf's mergeBooks) ----------------
     Union of local + remote by id. Newer updatedAt wins; on a tie, remote wins
     (cloud is source of truth). Nothing is ever silently dropped by a whole-array
     overwrite — that's what let concurrent edits from two people stomp on each
     other before. Deletes are soft (item.deleted = true, still carries an
     updatedAt) so a delete on one device reliably beats a stale edit from
     another instead of the item quietly reappearing after a sync.
  --------------------------------------------------------------------------------- */
  var TOMBSTONE_MAX_AGE_MS = 1000 * 60 * 60 * 24 * 60; // 60 days — quietly drop old deleted rows

  function mergeEntries(local, remote) {
    if (!Array.isArray(local)) local = [];
    if (!Array.isArray(remote)) remote = [];

    local.forEach(function (e) { if (e && e.id != null) map[e.id] = e; });
    remote.forEach(function (e) {
      if (!e || e.id == null) return;
      var l = map[e.id];
      if (!l || (e.updatedAt || 0) >= (l.updatedAt || 0)) map[e.id] = e;
    });
    var now = Date.now();
    return Object.values(map).filter(function (e) {
      return !(e.deleted && (now - (e.updatedAt || 0)) > TOMBSTONE_MAX_AGE_MS);

  var pushTimer = null;

  function doPush() {
    if (!configReady()) return;
    if (isPushing) { pushQueued = true; return; }

    updateSyncStatus("syncing");
    loadKey("entries", state.entries).then(function (remote) {
      var merged = mergeEntries(state.entries, remote);
      // Safety guard: never push an empty array over real cloud data — mirrors
      // My Shelf's "refuse to push empty" check, adapted for a merged result.
      if (merged.length === 0 && Array.isArray(remote) && remote.length > 0) {
        return { ok: true, merged: remote };
      }
      return saveKey("entries", merged).then(function (ok) { return { ok: ok, merged: merged }; });
    }).then(function (result) {
      isPushing = false;
      var changed = JSON.stringify(result.merged) !== JSON.stringify(state.entries);
      state.entries = result.merged;
      updateSyncStatus(result.ok ? "idle" : "error");
      if (changed && !isUserTyping()) render();
      if (pushQueued) { pushQueued = false; persistEntries(); }
    }).catch(function () {

      if (pushQueued) { pushQueued = false; persistEntries(); }

      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showInfoToast("Backup downloaded");
    });
  }

  var trashBtnEl = document.getElementById("trashBtn");
  if (trashBtnEl) trashBtnEl.addEventListener("click", openTrashPanel);

  var shareBtnEl = document.getElementById("shareBtn");
  if (shareBtnEl) {
    shareBtnEl.addEventListener("click", function () {
      if (!configReady()) { showInfoToast("Connect Supabase first to share a link"); return; }
      var snapId = uid();
      saveKey("snapshot:" + snapId, activeEntries()).then(function (ok) {
        if (!ok) { showInfoToast("Couldn't create the link — try again"); return; }
        var url = location.origin + location.pathname + "?snapshot=" + snapId;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url)
            .then(function () { showInfoToast("Read-only link copied to clipboard"); })
            .catch(function () { showInfoToast("Link: " + url); });
        } else {
          showInfoToast("Link: " + url);
        }
      });
    });
  }

  document.addEventListener("click", function () {
    if (!state._openMenu) return;
    state._openMenu = null;
    render();
  });

  /* ---------------- nav ---------------- */
  function renderNav() {
    var nav = document.getElementById("nav");
    nav.innerHTML = NAV_ITEMS.map(function (item) {
      return '<button class="nav-btn' + (state.view === item.id ? ' active' : '') + '" data-view="' + item.id + '">' +
        ICONS[item.id] + '<span class="label">' + item.label + '</span></button>';
    }).join("") + (state._readOnly ? '<div style="font-size:10.5px;color:#D7DAB3;margin-top:8px;line-height:1.4;">📖 Read-only snapshot</div>' : '');
    Array.prototype.forEach.call(nav.querySelectorAll(".nav-btn"), function (btn) {
      btn.addEventListener("click", function () {
        state.view = btn.getAttribute("data-view");
        renderNav();
        render();
      });
    });
  }

  function render() {
    var main = document.getElementById("main");
    var banner = state._readOnly ? '<div class="readonly-banner">📖 You\'re viewing a shared read-only snapshot. Nothing you do here saves or syncs back.</div>' : '';
    main.innerHTML = banner + (state.view === "timeline" ? viewTimeline() : state.view === "notes" ? viewNotes() : viewChecklist());
    bindViewEvents();
  }

  /* ---------------- Timeline ----------------
     Checklist items and milestones live here — notes have their own tab.
     Entries sharing the same date are grouped under one date/dot so they
     sit alongside each other instead of each repeating a full date line,
     one after another.
  --------------------------------------------------------------------- */
  function viewTimeline() {
    var all = activeEntries().filter(function (e) { return e.type !== "note"; });
    var checklistItems = all.filter(function (e) { return e.type === "checklist"; });
    var openItems = checklistItems.filter(function (t) { return t.status !== "Done"; });
    var overdue = openItems.filter(function (t) { return t.date && dateStatus(t.date) === "overdue"; });

    var ownerFilter = state._ownerFilter || "All";
    var hideDone = !!state._hideDone;
    var visible = all.filter(function (e) {
      if (e.type === "checklist") {
        if (ownerFilter !== "All" && e.owner !== ownerFilter) return false;
        if (hideDone && e.status === "Done") return false;
      }
      if (e.type === "milestone" && hideDone && e.status === "Complete") return false;
      return true;
    }).slice().sort(function (a, b) {
      var da = (a.date || NO_DATE), db = (b.date || NO_DATE);
      return da < db ? -1 : da > db ? 1 : 0;
    });

    var today = todayISO();
    var groups = groupEntriesByDate(visible);
    var rows = [];
    var insertedToday = false;
    groups.forEach(function (g) {
      if (!insertedToday && (g.date || NO_DATE) >= today) {
        rows.push(todayLineHTML(today));
        insertedToday = true;
      }
      rows.push(renderGroup(g));
    });
    if (!insertedToday) rows.push(todayLineHTML(today));

    return (
      '<div class="view-head"><h2 class="display">Timeline</h2><p>Checklist items and milestones — one feed, in order. Same-day items sit side by side.</p></div>' +
      '<div class="tiles">' +
        '<div class="tile"><div class="num">' + openItems.length + '</div><div class="label">Open items</div></div>' +
        '<div class="tile tile-blossom"><div class="num">' + overdue.length + '</div><div class="label">Overdue</div></div>' +
        '<div class="tile tile-mint"><div class="num">' + all.length + '</div><div class="label">Logged entries</div></div>' +
      '</div>' +
      (state._readOnly ? '' : renderAddPanel()) +
      '<div class="filters">' +
        '<div class="owner-pills">' +
          ["All"].concat(OWNERS).map(function (o) {
            return '<button type="button" class="owner-pill' + (o === ownerFilter ? " active" : "") + '" data-owner-filter="' + o + '">' + (o === "All" ? "All owners" : o) + '</button>';
          }).join("") +
        '</div>' +
        '<label class="hide-done-toggle"><input type="checkbox" id="hideDoneToggle"' + (hideDone ? " checked" : "") + '> Hide completed</label>' +
      '</div>' +
      (visible.length === 0
        ? '<div class="empty-state">Nothing here yet — add a checklist item or milestone above.</div>'
        : '<div class="timeline">' + rows.join("") + '</div>')
    );
  }

  function renderAddPanel() {
    var type = state._addType || "checklist";
    var typeBtns = ["checklist", "milestone"].map(function (t) {
      var label = t === "checklist" ? "Checklist" : "Milestone";
      return '<button type="button" class="type-btn' + (type === t ? " active" : "") + '" data-add-type="' + t + '">' + label + '</button>';
    }).join("");

    var fields = "";
    if (type === "checklist") {
      fields =
        '<div class="form-grid">' +
          '<div class="field wide"><label for="eText">Item</label><input type="text" id="eText" placeholder="e.g. Get NFHS dataset" required></div>' +
          '<div class="field"><label for="eOwner">Assigned to</label><select id="eOwner"><option value="">— Unassigned —</option>' + OWNERS.map(function (o) { return '<option value="' + o + '">' + o + '</option>'; }).join("") + '</select></div>' +
          '<div class="field"><label for="eDate">Deadline (optional)</label><input type="date" id="eDate"></div>' +
        '</div>';
    } else {
      fields =
        '<div class="form-grid">' +
          '<div class="field"><label for="ePhase">Phase</label><input type="text" id="ePhase" placeholder="4.7" required></div>' +
          '<div class="field"><label for="eDate">Deadline (optional)</label><input type="date" id="eDate"></div>' +
          '<div class="field wide"><label for="eLabel">Description</label><input type="text" id="eLabel" placeholder="What this phase covers" required></div>' +
        '</div>';
    }

    return (
      '<div class="form-panel">' +
        '<h3>Add to timeline</h3>' +
        '<div class="type-toggle" id="typeToggle">' + typeBtns + '</div>' +
        '<form id="entryForm">' + fields + '<div class="form-actions"><button type="submit" class="btn btn-primary">Add</button></div></form>' +
      '</div>'
    );
  }

  /* one date + dot, all of that day's items alongside each other as chips */
  function renderGroup(g) {
    var dot = groupDotStatus(g.items);
    var overdueStyle = dot === "overdue" ? ' style="color:var(--berry);font-weight:600"' : '';
    return (
      '<div class="t-item">' +
        '<div class="t-dot ' + dot + '"></div>' +
        '<div class="t-date"' + overdueStyle + '>' + fmtDate(g.date) + '</div>' +
        '<div class="t-group-items">' + g.items.map(renderChip).join("") + '</div>' +
      '</div>'
    );
  }

  function renderChip(e) {
    if (e.type === "checklist") {
      var cChecked = e.status === "Done";
      var cDot = entryDot(e);
      var showTag = cChecked || !!e.date;
      return (
        '<div class="t-chip">' +
          '<div class="task-check' + (cChecked ? ' checked' : '') + '" data-toggle-entry="' + e.id + '" aria-label="Toggle done">' + (cChecked ? ICON_CHECK : '') + '</div>' +
          '<span class="t-chip-type">Checklist</span>' +
          '<span class="t-chip-title' + (cChecked ? " done-text" : "") + '">' + esc(e.text) + '</span>' +
          (e.owner ? '<span class="pill ' + pillClass(e.owner) + '">' + e.owner + '</span>' : '') +
          (showTag ? '<span class="status-tag status-' + cDot + '">' + statusLabel(cDot) + '</span>' : '') +
          '<button class="icon-btn" data-del-entry="' + e.id + '" aria-label="Delete item">' + ICON_TRASH + '</button>' +
        '</div>'
      );
    }
    // milestone
    return (
      '<div class="t-chip">' +
        '<span class="t-chip-type">Phase ' + esc(e.phase) + '</span>' +
        '<span class="t-chip-title">' + esc(e.label) + '</span>' +
        '<span class="status-tag ' + milestoneStatusClass(e.status) + '">' + esc(e.status) + '</span>' +
        '<select data-milestone-status="' + e.id + '" style="width:auto;font-size:11.5px;padding:3px 6px">' +
          MILESTONE_STATUSES.map(function (s) { return '<option value="' + s + '"' + (s === e.status ? " selected" : "") + '>' + s + '</option>'; }).join("") +
        '</select>' +
        '<button class="icon-btn" data-del-entry="' + e.id + '" aria-label="Delete milestone">' + ICON_TRASH + '</button>' +
      '</div>'
    );
  }

  /* ---------------- Checklist ----------------
     Sourced straight from state.entries (type:"checklist") — there is no
     separate checklist store, so ticking/adding/deleting here IS the same
     write as the Timeline feed sees. Sorted by deadline (undated items last).
  --------------------------------------------------------------------------- */
  function viewChecklist() {
    var items = activeEntries().filter(function (e) { return e.type === "checklist"; })
      .slice().sort(function (a, b) {
        var da = (a.date || NO_DATE), db = (b.date || NO_DATE);
        return da < db ? -1 : da > db ? 1 : 0;
      });

    var rows = items.map(function (item) {
      var checked = item.status === "Done";
      var dot = checked ? "done" : (item.date ? dateStatus(item.date) : null);
      var menuOpen = state._openMenu === item.id;
      return (
        '<div class="checklist-row">' +
          '<div class="task-check' + (checked ? ' checked' : '') + '" data-toggle-entry="' + item.id + '" aria-label="Toggle done">' +
            (checked ? ICON_CHECK : '') +
          '</div>' +
          '<div class="checklist-text' + (checked ? ' checked' : '') + '">' + esc(item.text) + '</div>' +
          (item.owner ? '<span class="pill ' + pillClass(item.owner) + '">' + item.owner + '</span>' : '') +
          (item.date ? '<span class="date-chip">' + fmtDateShort(item.date) + '</span>' : '') +
          (dot ? '<span class="status-tag status-' + dot + '">' + statusLabel(dot) + '</span>' : '') +
          '<div class="checklist-menu-wrap">' +
            '<button type="button" class="icon-btn menu-btn" data-menu-toggle="' + item.id + '" aria-label="More options">' + ICON_DOTS + '</button>' +
            (menuOpen ? renderChecklistMenu(item) : '') +
          '</div>' +
        '</div>'
      );
    }).join("");

    return (
      '<div class="view-head"><h2 class="display">Checklist</h2><p>Check things off — every change also shows up on the Timeline.</p></div>' +
      '<div class="checklist-card">' +
        (items.length === 0 ? '<div class="empty-state">No checklist items yet — add one below.</div>' : rows) +
      '</div>' +
      (state._readOnly ? '' :
      '<div class="add-inline">' +
        '<input type="text" id="newCheckItem" placeholder="Add a checklist item…">' +
        '<select id="newCheckOwner"><option value="">— Unassigned —</option>' + OWNERS.map(function (o) { return '<option value="' + o + '">' + o + '</option>'; }).join("") + '</select>' +
        '<input type="date" id="newCheckDeadline">' +
        '<button class="btn btn-ghost" id="addCheckBtn">Add</button>' +
      '</div>')
    );
  }

  function renderChecklistMenu(item) {
    return (
      '<div class="checklist-menu" data-menu-panel="' + item.id + '">' +
        '<label for="deadline-' + item.id + '">Deadline</label>' +
        '<input type="date" id="deadline-' + item.id + '" data-set-deadline="' + item.id + '" value="' + esc(item.date || "") + '">' +
        (item.date ? '<button type="button" class="menu-link" data-clear-deadline="' + item.id + '">Remove date</button>' : '') +
        '<label for="owner-' + item.id + '">Assigned to</label>' +
        '<select id="owner-' + item.id + '" data-set-owner="' + item.id + '">' +
          '<option value="">— None —</option>' +
          OWNERS.map(function (o) { return '<option value="' + o + '"' + (o === item.owner ? " selected" : "") + '>' + o + '</option>'; }).join("") +
        '</select>' +
        '<button type="button" class="menu-delete" data-del-entry="' + item.id + '">Delete item</button>' +
      '</div>'
    );
  }

  /* ---------------- Notes ----------------
     A sticky-note board, separate from the Timeline. Text is directly
     editable in place, dates are click-to-edit, a small toolbar (Bold /
     bulleted list / highlight) appears while a note is focused, and cards
     are only draggable from the left grip strip so clicking or selecting
     text never triggers a reorder. Colors cycle through the palette by
     display position, so no two neighboring cards ever match.
  --------------------------------------------------------------------- */
  function noteSortValue(e) {
    return e.sortIndex != null ? e.sortIndex : (e.updatedAt || 0);
  }

  function sortedNotes() {
    var dir = state._noteSort || "desc";
    var byDir = function (a, b) {
      var va = noteSortValue(a), vb = noteSortValue(b);
      return dir === "asc" ? va - vb : vb - va;
    };
    var notes = activeEntries().filter(function (e) { return e.type === "note"; });
    var pinned = notes.filter(function (n) { return n.pinned; }).sort(byDir);
    var rest = notes.filter(function (n) { return !n.pinned; }).sort(byDir);
    return pinned.concat(rest);
  }

  function reorderNotes(draggedId, targetId) {
    var dir = state._noteSort || "desc";
    var notes = sortedNotes();
    var fromIdx = notes.findIndex(function (n) { return n.id === draggedId; });
    var toIdx = notes.findIndex(function (n) { return n.id === targetId; });
    if (fromIdx === -1 || toIdx === -1) return;
    var moved = notes.splice(fromIdx, 1)[0];
    notes.splice(toIdx, 0, moved);
    var n = notes.length;
    notes.forEach(function (note, i) {
      note.sortIndex = dir === "asc" ? i : (n - 1 - i);
      note.updatedAt = Date.now();
    });
  }

  function viewNotes() {
    var sortDir = state._noteSort || "desc";
    var notes = sortedNotes();
    var cards = notes.map(function (n, i) { return renderNoteCard(n, i); }).join("");

    return (
      '<div class="view-head"><h2 class="display">Notes</h2><p>Click into a note to edit it. Drag from the grip on the left to reorder.</p></div>' +
      '<div class="notes-toolbar">' +
        '<div class="sort-toggle">' +
          '<button type="button" class="sort-btn' + (sortDir === "desc" ? " active" : "") + '" data-note-sort="desc">Newest first</button>' +
          '<button type="button" class="sort-btn' + (sortDir === "asc" ? " active" : "") + '" data-note-sort="asc">Oldest first</button>' +
        '</div>' +
      '</div>' +
      (notes.length === 0
        ? '<div class="empty-state">No notes yet — click the + button to add one.</div>'
        : '<div class="notes-grid" id="notesGrid">' + cards + '</div>') +
      (state._readOnly ? '' : '<button type="button" class="fab" id="addNoteFab" aria-label="Add note">+</button>') +
      (state._noteFormOpen ? renderNotePopup() : '')
    );
  }

  var ICON_PIN = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M16 3l5 5-4 4 1 6-6-4-6 6-1-1 6-6-4-6 6 1 4-4z"/></svg>';
  var ICON_PIN_OUTLINE = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M16 3l5 5-4 4 1 6-6-4-6 6-1-1 6-6-4-6 6 1 4-4z"/></svg>';

  function renderNoteCard(e, idx) {
    var c = noteColor(idx);
    var html = e.html != null ? e.html : esc(e.text || "");
    var style = 'background:' + c.bg + ';border-color:' + c.border + ';color:' + c.ink + ';';
    var ro = state._readOnly;
    return (
      '<div class="note-card' + (e.pinned ? ' pinned' : '') + '" data-note-id="' + e.id + '" style="' + style + '">' +
        (ro ? '' : '<div class="note-drag-handle" data-drag-handle="' + e.id + '" aria-label="Drag to reorder">' + ICON_GRIP + '</div>') +
        (ro ? '' : '<button type="button" class="icon-btn note-pin-btn' + (e.pinned ? ' pinned' : '') + '" data-pin-toggle="' + e.id + '" style="color:' + c.ink + '" aria-label="' + (e.pinned ? "Unpin note" : "Pin note") + '">' + (e.pinned ? ICON_PIN : ICON_PIN_OUTLINE) + '</button>') +
        '<div class="note-date-wrap"><span class="note-date" data-date-display="' + e.id + '">' + fmtDateShort(e.date) + '</span></div>' +
        (ro ? '' :
        '<div class="note-toolbar" data-toolbar-for="' + e.id + '">' +
          '<button type="button" data-fmt="bold" title="Bold"><b>B</b></button>' +
          '<button type="button" data-fmt="list" title="Bulleted list">&#8226;</button>' +
          '<button type="button" data-fmt="highlight" title="Highlight">H</button>' +
        '</div>') +
        '<div class="note-text" contenteditable="' + (ro ? 'false' : 'true') + '" data-note-text="' + e.id + '">' + html + '</div>' +
        (ro ? '' : '<button class="icon-btn note-del" data-del-entry="' + e.id + '" aria-label="Delete note" style="color:' + c.ink + '">' + ICON_TRASH + '</button>') +
      '</div>'
    );
  }

  function renderNotePopup() {
    return (
      '<div class="note-popup-overlay" id="notePopupOverlay">' +
        '<div class="note-popup">' +
          '<h3>Add a note</h3>' +
          '<form id="noteForm">' +
            '<div class="field"><label for="nDate">Date</label><input type="date" id="nDate" value="' + todayISO() + '" required></div>' +
            '<div class="field" style="margin-top:10px"><label for="nText">Note</label><textarea id="nText" placeholder="Jot something down…" required></textarea></div>' +
            '<div class="form-actions"><button type="submit" class="btn btn-primary">Add</button><button type="button" class="btn btn-ghost" id="cancelNoteBtn">Cancel</button></div>' +
          '</form>' +
        '</div>' +
      '</div>'
    );
  }

  /* ---------------- events ---------------- */
  function bindViewEvents() {
    // type toggle
    Array.prototype.forEach.call(document.querySelectorAll("[data-add-type]"), function (btn) {
      btn.addEventListener("click", function () {
        state._addType = btn.getAttribute("data-add-type");
        render();
      });
    });

    // owner filter
    Array.prototype.forEach.call(document.querySelectorAll("[data-owner-filter]"), function (btn) {
      btn.addEventListener("click", function () {
        state._ownerFilter = btn.getAttribute("data-owner-filter");
        render();
      });
    });
    var hideDoneToggle = document.getElementById("hideDoneToggle");
    if (hideDoneToggle) hideDoneToggle.addEventListener("change", function () { state._hideDone = hideDoneToggle.checked; render(); });

    // add entry (Timeline: checklist / milestone)
    var entryForm = document.getElementById("entryForm");
    if (entryForm) {
      entryForm.addEventListener("submit", function (ev) {
        ev.preventDefault();
        var type = state._addType || "checklist";
        var entry = { id: uid(), type: type, updatedAt: Date.now() };
        if (type === "checklist") {
          entry.text = document.getElementById("eText").value.trim();
          if (!entry.text) return;
          entry.owner = document.getElementById("eOwner").value || "";
          entry.date = document.getElementById("eDate").value || "";
          entry.status = "Open";
        } else {
          entry.phase = document.getElementById("ePhase").value.trim();
          entry.label = document.getElementById("eLabel").value.trim();
          if (!entry.phase || !entry.label) return;
          entry.date = document.getElementById("eDate").value || "";
          entry.status = "Not started";
        }
        state.entries.push(entry);
        persistEntries();
        render();
      });
    }

    // add entry (Notes popup)
    var noteForm = document.getElementById("noteForm");
    if (noteForm) {
      noteForm.addEventListener("submit", function (ev) {
        ev.preventDefault();
        var text = document.getElementById("nText").value.trim();
        if (!text) return;
        var entry = { id: uid(), type: "note", date: document.getElementById("nDate").value, text: text, html: esc(text), sortIndex: Date.now(), updatedAt: Date.now() };
        state.entries.push(entry);
        state._noteFormOpen = false;
        persistEntries();
        render();
      });
    }
    var cancelNoteBtn = document.getElementById("cancelNoteBtn");
    if (cancelNoteBtn) {
      cancelNoteBtn.addEventListener("click", function () {
        state._noteFormOpen = false;
        render();
      });
    }
    var notePopupOverlay = document.getElementById("notePopupOverlay");
    if (notePopupOverlay) {
      notePopupOverlay.addEventListener("click", function (ev) {
        if (ev.target === notePopupOverlay) { state._noteFormOpen = false; render(); }
      });
      var notePopupInner = notePopupOverlay.querySelector(".note-popup");
      if (notePopupInner) notePopupInner.addEventListener("click", function (ev) { ev.stopPropagation(); });
    }
    var addNoteFab = document.getElementById("addNoteFab");
    if (addNoteFab) {
      addNoteFab.addEventListener("click", function (ev) {
        ev.stopPropagation();
        state._noteFormOpen = true;
        render();
      });
    }
    // note sort toggle
    Array.prototype.forEach.call(document.querySelectorAll("[data-note-sort]"), function (btn) {
      btn.addEventListener("click", function () {
        state._noteSort = btn.getAttribute("data-note-sort");
        render();
      });
    });

    // drag-and-drop reordering for note cards — only the left grip strip
    // arms dragging, so clicking/selecting text never starts a drag
    Array.prototype.forEach.call(document.querySelectorAll(".note-card"), function (card) {
      card.setAttribute("draggable", "false");
      card.addEventListener("dragstart", function () {
        draggedNoteId = card.getAttribute("data-note-id");
        card.classList.add("dragging");
      });
      card.addEventListener("dragend", function () {
        card.classList.remove("dragging");
        card.setAttribute("draggable", "false");
      });
      card.addEventListener("dragover", function (ev) { ev.preventDefault(); });
      card.addEventListener("drop", function (ev) {
        ev.preventDefault();
        var targetId = card.getAttribute("data-note-id");
        if (!draggedNoteId || draggedNoteId === targetId) return;
        reorderNotes(draggedNoteId, targetId);
        draggedNoteId = null;
        persistEntries();
        render();
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-drag-handle]"), function (handle) {
      handle.addEventListener("mousedown", function () {
        var card = handle.closest(".note-card");
        if (card) card.setAttribute("draggable", "true");
      });
      handle.addEventListener("touchstart", function () {
        var card = handle.closest(".note-card");
        if (card) card.setAttribute("draggable", "true");
      });
    });
    document.addEventListener("mouseup", function () {
      Array.prototype.forEach.call(document.querySelectorAll(".note-card"), function (card) {
        if (!card.classList.contains("dragging")) card.setAttribute("draggable", "false");
      });
    });

    // editable note text — contenteditable, saved as HTML so bold/list/
    // highlight formatting survives; no full re-render while typing so the
    // caret position and current selection are never disturbed
    Array.prototype.forEach.call(document.querySelectorAll("[data-note-text]"), function (el) {
      var id = el.getAttribute("data-note-text");
      el.addEventListener("focus", function () {
        var card = el.closest(".note-card");
        if (card) card.classList.add("editing");
      });
      el.addEventListener("input", function () {
        var n = state.entries.find(function (x) { return x.id === id; });
        if (n) { n.html = el.innerHTML; n.text = el.textContent; n.updatedAt = Date.now(); }
        persistEntries();
      });
      el.addEventListener("blur", function () {
        linkifyNoteEl(el);
        var n2 = state.entries.find(function (x) { return x.id === id; });
        if (n2) { n2.html = el.innerHTML; n2.text = el.textContent; n2.updatedAt = Date.now(); }
        persistEntries();
        var card = el.closest(".note-card");
        if (card) card.classList.remove("editing");
        render();
      });
    });
    // pin / unpin a note — pinned notes float to the top regardless of sort
    Array.prototype.forEach.call(document.querySelectorAll("[data-pin-toggle]"), function (btn) {
      btn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        var id = btn.getAttribute("data-pin-toggle");
        var n = state.entries.find(function (x) { return x.id === id; });
        if (n) { n.pinned = !n.pinned; n.updatedAt = Date.now(); }
        persistEntries();
        render();
      });
    });
    // formatting toolbar — Bold / bulleted list / highlight
    Array.prototype.forEach.call(document.querySelectorAll("[data-fmt]"), function (btn) {
      btn.addEventListener("mousedown", function (ev) { ev.preventDefault(); });
      btn.addEventListener("click", function () {
        var toolbar = btn.closest(".note-toolbar");
        var id = toolbar ? toolbar.getAttribute("data-toolbar-for") : null;
        var textEl = id ? document.querySelector('[data-note-text="' + id + '"]') : null;
        if (!textEl) return;
        textEl.focus();
        var cmd = btn.getAttribute("data-fmt");
        if (cmd === "bold") document.execCommand("bold");
        else if (cmd === "list") document.execCommand("insertUnorderedList");
        else if (cmd === "highlight") document.execCommand("hiliteColor", false, "rgba(255,255,255,.55)");
        var n = state.entries.find(function (x) { return x.id === id; });
        if (n) { n.html = textEl.innerHTML; n.text = textEl.textContent; n.updatedAt = Date.now(); }
        persistEntries();
      });
    });
    // click-to-edit note date
    Array.prototype.forEach.call(document.querySelectorAll("[data-date-display]"), function (span) {
      span.addEventListener("click", function () {
        if (state._readOnly) return;
        var id = span.getAttribute("data-date-display");
        var n = state.entries.find(function (x) { return x.id === id; });
        if (!n) return;
        var input = document.createElement("input");
        input.type = "date";
        input.className = "note-date-input";
        input.value = n.date || "";
        span.replaceWith(input);
        input.focus();
        function commit() {
          n.date = input.value || n.date;
          n.updatedAt = Date.now();
          persistEntries();
          render();
        }
        input.addEventListener("change", commit);
        input.addEventListener("blur", function () { render(); });
      });
    });

    // toggles checklist entries (Done/Open) — this single handler is what
    // makes checking a box on the Checklist tab show up on the Timeline
    Array.prototype.forEach.call(document.querySelectorAll("[data-toggle-entry]"), function (el) {
      el.addEventListener("click", function () {
        var id = el.getAttribute("data-toggle-entry");
        var t = state.entries.find(function (x) { return x.id === id; });
        if (t) { t.status = t.status === "Done" ? "Open" : "Done"; t.updatedAt = Date.now(); }
        persistEntries();
        render();
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-milestone-status]"), function (el) {
      el.addEventListener("change", function () {
        var id = el.getAttribute("data-milestone-status");
        var m = state.entries.find(function (x) { return x.id === id; });
        if (m) { m.status = el.value; m.updatedAt = Date.now(); }
        persistEntries();
        render();
      });
    });
    // set/clear a checklist item's deadline via the ⋮ menu
    Array.prototype.forEach.call(document.querySelectorAll("[data-set-deadline]"), function (el) {
      el.addEventListener("change", function () {
        var id = el.getAttribute("data-set-deadline");
        var it = state.entries.find(function (x) { return x.id === id; });
        if (it) { it.date = el.value || ""; it.updatedAt = Date.now(); }
        persistEntries();
        render();
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll("[data-clear-deadline]"), function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-clear-deadline");
        var it = state.entries.find(function (x) { return x.id === id; });
        if (it) { it.date = ""; it.updatedAt = Date.now(); }
        persistEntries();
        render();
      });
    });
    // assign/reassign/unassign a checklist item's person via the ⋮ menu
    Array.prototype.forEach.call(document.querySelectorAll("[data-set-owner]"), function (el) {
      el.addEventListener("change", function () {
        var id = el.getAttribute("data-set-owner");
        var it = state.entries.find(function (x) { return x.id === id; });
        if (it) { it.owner = el.value || ""; it.updatedAt = Date.now(); }
        persistEntries();
        render();
      });
    });
    // open/close the per-row ⋮ menu
    Array.prototype.forEach.call(document.querySelectorAll("[data-menu-toggle]"), function (btn) {
      btn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        var id = btn.getAttribute("data-menu-toggle");
        state._openMenu = state._openMenu === id ? null : id;
        render();
      });
    });
    // keep clicks inside an open menu from bubbling to the document closer
    Array.prototype.forEach.call(document.querySelectorAll(".checklist-menu"), function (panel) {
      panel.addEventListener("click", function (ev) { ev.stopPropagation(); });
    });
    // delete with a 5s undo window (soft-tombstone only happens if not undone)
    Array.prototype.forEach.call(document.querySelectorAll("[data-del-entry]"), function (btn) {
      btn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        requestDelete(btn.getAttribute("data-del-entry"));
      });
    });

    // quick-add on the Checklist tab — pushes a normal type:"checklist" entry
    // with owner + deadline included directly (no need to open the ⋮ menu)
    var addCheckBtn = document.getElementById("addCheckBtn");
    if (addCheckBtn) {
      addCheckBtn.addEventListener("click", function () {
        var input = document.getElementById("newCheckItem");
        var ownerSel = document.getElementById("newCheckOwner");
        var deadlineInput = document.getElementById("newCheckDeadline");
        var val = input.value.trim();
        if (!val) return;
        state.entries.push({
          id: uid(), type: "checklist", text: val,
          date: deadlineInput ? deadlineInput.value : "",
          owner: ownerSel ? ownerSel.value : "",
          status: "Open", updatedAt: Date.now()
        });
        input.value = "";
        if (ownerSel) ownerSel.value = "";
        if (deadlineInput) deadlineInput.value = "";
        persistEntries();
        render();
      });
    }
    var newCheckItem = document.getElementById("newCheckItem");
    if (newCheckItem) {
      newCheckItem.addEventListener("keydown", function (e) {
        if (e.key === "Enter") { e.preventDefault(); addCheckBtn.click(); }
      });
    }
  }

  init();
})();
</script>
